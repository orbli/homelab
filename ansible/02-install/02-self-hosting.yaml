---
# Configure ArgoCD to be self-hosting by pointing to Git repository
# ArgoCD will watch the Git repo for its own configuration

- name: Configure ArgoCD Self-Hosting from Git
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    namespace: gitops
    git_repo: https://github.com/orbli/homelab.git
    git_branch: master
    # Path in your repo where ArgoCD configuration is stored
    argocd_config_path: kubernetes/gitops/argocd-core
    
  tasks:
    - name: Verify ArgoCD is running
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app.kubernetes.io/name=argocd-application-controller
      register: controller_check
      failed_when: controller_check.resources | length == 0

    - name: Create self-hosting Application pointing to Git
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: argocd-core
            namespace: "{{ namespace }}"
            finalizers:
              - resources-finalizer.argocd.argoproj.io
            labels:
              app.kubernetes.io/name: argocd-core
              app.kubernetes.io/part-of: argocd
          spec:
            project: default
            
            source:
              repoURL: "{{ git_repo }}"
              targetRevision: "{{ git_branch }}"
              path: "{{ argocd_config_path }}"
              # Using directory of manifests
              directory:
                recurse: true
            
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ namespace }}"
            
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
                allowEmpty: false
              syncOptions:
                - CreateNamespace=false
                - ServerSideApply=true
                - PrunePropagationPolicy=foreground
                - Replace=true  # Replace existing resources
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m
            
            revisionHistoryLimit: 10

    - name: Wait for Application to be created
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: argocd-core
        namespace: "{{ namespace }}"
      register: app_status
      until: app_status.resources | length > 0
      retries: 10
      delay: 5

    - name: Get Application status
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: argocd-core
        namespace: "{{ namespace }}"
      register: app_info

    - name: Display self-hosting status
      debug:
        msg: |
          =====================================
          ArgoCD Self-Hosting from Git Configured
          =====================================
          
          Application: argocd-core
          Namespace: {{ namespace }}
          
          Git Source:
          - Repository: {{ git_repo }}
          - Branch: {{ git_branch }}
          - Path: {{ argocd_config_path }}
          
          Sync Policy:
          - Automated: Yes
          - Self-Heal: Yes
          - Prune: Yes
          
          Current Status:
          - Sync: {{ app_info.resources[0].status.sync.status | default('Unknown') }}
          - Health: {{ app_info.resources[0].status.health.status | default('Unknown') }}
          
          ⚠️  IMPORTANT: 
          You need to create the ArgoCD configuration at:
          {{ git_repo }}/tree/{{ git_branch }}/{{ argocd_config_path }}
          
          This should contain either:
          1. Kustomization that builds ArgoCD manifests
          2. Helm values file for ArgoCD
          3. Raw Kubernetes manifests for ArgoCD
          
          ArgoCD will now watch this Git location and 
          automatically apply any configuration changes!
          
          To check status:
          kubectl get application argocd-core -n {{ namespace }}
          
          To manually sync:
          kubectl patch application argocd-core -n {{ namespace }} \
            --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          ====================================