---
# Install ArgoCD Core (headless - no UI/server)
# Only the GitOps engine components

- name: Install ArgoCD Core Components Only
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    namespace: gitops
    argocd_version: 7.7.12
    
  tasks:
    - name: Create gitops namespace
      kubernetes.core.k8s:
        name: "{{ namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Add ArgoCD Helm repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm
        state: present

    - name: Install ArgoCD Core (no server/UI)
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: "{{ namespace }}"
        chart_version: "{{ argocd_version }}"
        values:
          # CORE MODE - Disable ALL UI/Server components
          server:
            enabled: false
          
          # Disable Dex (OIDC provider for UI)
          dex:
            enabled: false
            
          # Disable notifications controller
          notifications:
            enabled: false
            
          # Core Components Only
          controller:
            replicas: 1
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 250m
                memory: 256Mi
                
          repoServer:
            replicas: 1
            resources:
              limits:
                cpu: 500m
                memory: 1Gi
              requests:
                cpu: 200m
                memory: 512Mi
            env:
              - name: GOGC
                value: "50"
                
          redis:
            enabled: true
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
                
          applicationSet:
            enabled: true
            replicas: 1
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
                
          configs:
            cm:
              timeout.reconciliation: "180s"
              application.instanceLabelKey: argocd.argoproj.io/instance
            params:
              controller.status.processors: "10"
              controller.operation.processors: "5"
              controller.self.heal.timeout.seconds: "5"
              reposerver.parallelism.limit: "2"
              
        state: present
        wait: true
        wait_timeout: 300s

    # - name: Force delete server components
    #   kubernetes.core.k8s:
    #     state: absent
    #     api_version: "{{ item.api }}"
    #     kind: "{{ item.kind }}"
    #     name: "{{ item.name }}"
    #     namespace: "{{ namespace }}"
    #   loop:
    #     - { api: "apps/v1", kind: "Deployment", name: "argocd-server" }
    #     - { api: "v1", kind: "Service", name: "argocd-server" }
    #     - { api: "v1", kind: "Service", name: "argocd-server-metrics" }
    #     - { api: "v1", kind: "ServiceAccount", name: "argocd-server" }
    #     - { api: "rbac.authorization.k8s.io/v1", kind: "Role", name: "argocd-server" }
    #     - { api: "rbac.authorization.k8s.io/v1", kind: "RoleBinding", name: "argocd-server" }
    #     - { api: "rbac.authorization.k8s.io/v1", kind: "ClusterRole", name: "argocd-server" }
    #     - { api: "rbac.authorization.k8s.io/v1", kind: "ClusterRoleBinding", name: "argocd-server" }
    #   ignore_errors: yes

    # - name: Wait for server pod to terminate
    #   kubernetes.core.k8s_info:
    #     api_version: v1
    #     kind: Pod
    #     namespace: "{{ namespace }}"
    #     label_selectors:
    #       - app.kubernetes.io/name=argocd-server
    #   register: server_pods
    #   until: server_pods.resources | length == 0
    #   retries: 10
    #   delay: 5
    #   ignore_errors: yes

    - name: Wait for pods to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app.kubernetes.io/instance=argocd
      register: pod_list
      until: pod_list.resources | selectattr('status.phase', 'equalto', 'Running') | list | length >= 4
      retries: 30
      delay: 10

    # - name: Verify NO server components exist
    #   kubernetes.core.k8s_info:
    #     api_version: v1
    #     kind: Service
    #     name: argocd-server
    #     namespace: "{{ namespace }}"
    #   register: server_check
    #   failed_when: server_check.resources | length > 0

    - name: Get running pods
      shell: kubectl get pods -n {{ namespace }} --no-headers | grep -v Completed | awk '{print $1}'
      register: running_pods

    - name: Get services
      shell: kubectl get svc -n {{ namespace }} --no-headers | awk '{print $1}'
      register: services

    - name: Display installation results
      debug:
        msg: |
          =====================================
          ArgoCD Core Installation Complete
          =====================================
          
          Namespace: {{ namespace }}
          Version: {{ argocd_version }}
          
          ✅ CORE MODE - NO UI/SERVER
          
          Running Pods:
          {{ running_pods.stdout }}
          
          Services:
          {{ services.stdout }}
          
          To deploy applications:
          kubectl apply -f <application.yaml>
          
          To check applications:
          kubectl get applications -n {{ namespace }}
          =====================================