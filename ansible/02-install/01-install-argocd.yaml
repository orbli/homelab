---
# Install ArgoCD Core (headless - no UI/server)
# Using official core-install.yaml manifest

- name: Install ArgoCD Core (Headless)
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    namespace: gitops
    argocd_version: v3.1.0
    argocd_core_manifest: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/core-install.yaml"
    
  tasks:
    - name: Create gitops namespace
      kubernetes.core.k8s:
        name: "{{ namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Apply ArgoCD Core manifest
      kubernetes.core.k8s:
        state: present
        namespace: "{{ namespace }}"
        src: "{{ argocd_core_manifest }}"
      register: manifest_result

    - name: Wait for ArgoCD controller to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app.kubernetes.io/name=argocd-application-controller
      register: controller_pods
      until: 
        - controller_pods.resources | length > 0
        - controller_pods.resources[0].status.phase == "Running"
      retries: 30
      delay: 10

    - name: Wait for ArgoCD repo-server to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app.kubernetes.io/name=argocd-repo-server
      register: repo_pods
      until:
        - repo_pods.resources | length > 0
        - repo_pods.resources[0].status.phase == "Running"
      retries: 30
      delay: 10

    - name: Get running pods
      shell: kubectl get pods -n {{ namespace }} --no-headers | grep -v Completed | awk '{print $1}'
      register: running_pods

    - name: Get services
      shell: kubectl get svc -n {{ namespace }} --no-headers | awk '{print $1}'
      register: services

    - name: Display installation results
      debug:
        msg: |
          =====================================
          ArgoCD Core Installation Complete
          =====================================
          
          Namespace: {{ namespace }}
          Version: {{ argocd_version }}
          
          Running Pods:
          {{ running_pods.stdout }}
          
          Services:
          {{ services.stdout }}
          
          To deploy applications:
          kubectl apply -f <application.yaml>
          
          To check applications:
          kubectl get applications -n {{ namespace }}
          
          To use ArgoCD CLI in core mode:
          ARGOCD_OPTS="--core" argocd app list
          =====================================