---
# Deploy Keycloak with Google OAuth integration via ArgoCD
# Requires: ansible/secrets/keycloak-secrets.yaml

- name: Deploy Keycloak via ArgoCD
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    namespace: keycloak
    gitops_namespace: gitops
    git_repo: https://github.com/orbli/homelab.git
    git_branch: master
    keycloak_path: kubernetes/apps/keycloak
    secrets_file: "../secrets/keycloak-secrets.yaml"
    
  tasks:
    - name: Check if secrets file exists
      stat:
        path: "{{ secrets_file }}"
      register: secrets_file_stat
      failed_when: not secrets_file_stat.stat.exists
      delegate_to: localhost

    - name: Load secrets
      include_vars: "{{ secrets_file }}"
      no_log: true

    - name: Verify ArgoCD is running
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ gitops_namespace }}"
        label_selectors:
          - app.kubernetes.io/name=argocd-application-controller
      register: argocd_check
      failed_when: argocd_check.resources | length == 0

    - name: Create Keycloak namespace
      kubernetes.core.k8s:
        name: "{{ namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Create database secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-db-secret
            namespace: "{{ namespace }}"
          type: Opaque
          stringData:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: "{{ postgres_password }}"

    - name: Create Keycloak admin secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-admin-secret
            namespace: "{{ namespace }}"
          type: Opaque
          stringData:
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: "{{ keycloak_admin_password }}"

    - name: Create Google OAuth secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-oauth-secret
            namespace: "{{ namespace }}"
          type: Opaque
          stringData:
            GOOGLE_CLIENT_ID: "{{ google_client_id }}"
            GOOGLE_CLIENT_SECRET: "{{ google_client_secret }}"

    - name: Read realm import file
      slurp:
        src: "../../{{ keycloak_path }}/realm-import.json"
      register: realm_import_content

    - name: Update realm import with OAuth credentials
      set_fact:
        realm_config: "{{ realm_import_content.content | b64decode | from_json }}"

    - name: Update Google OAuth config in realm
      set_fact:
        realm_config: "{{ realm_config | combine({'identityProviders': [realm_config.identityProviders[0] | combine({'config': realm_config.identityProviders[0].config | combine({'clientId': google_client_id, 'clientSecret': google_client_secret})}, recursive=True)]}, recursive=True) }}"

    - name: Set initial user password in realm
      set_fact:
        realm_config: "{{ realm_config | combine({'users': [realm_config.users[0] | combine({'credentials': [{'type': 'password', 'value': initial_user_password, 'temporary': true}]}, recursive=True)]}, recursive=True) }}"

    - name: Create realm import ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: keycloak-realm-import
            namespace: "{{ namespace }}"
          data:
            orbb-li-realm.json: "{{ realm_config | to_nice_json }}"

    - name: Create Keycloak Application in ArgoCD
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: keycloak
            namespace: "{{ gitops_namespace }}"
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            
            source:
              repoURL: "{{ git_repo }}"
              targetRevision: "{{ git_branch }}"
              path: "{{ keycloak_path }}"
              kustomize: {}
            
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ namespace }}"
            
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
                allowEmpty: false
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - PrunePropagationPolicy=foreground
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m

    - name: Wait for Application to be created
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: keycloak
        namespace: "{{ gitops_namespace }}"
      register: app_status
      until: app_status.resources | length > 0
      retries: 10
      delay: 5

    - name: Trigger initial sync
      shell: |
        ARGOCD_OPTS="--core" argocd app sync keycloak --timeout 30 || true
      register: sync_result
      changed_when: "'Sync operation initiated' in (sync_result.stdout | default(''))"

    - name: Wait for PostgreSQL to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app=postgres
      register: postgres_pods
      until: 
        - postgres_pods.resources | length > 0
        - postgres_pods.resources[0].status.phase == "Running"
      retries: 30
      delay: 10

    - name: Wait for Keycloak to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app=keycloak
      register: keycloak_pods
      until:
        - keycloak_pods.resources | length > 0
        - keycloak_pods.resources[0].status.phase == "Running"
      retries: 60
      delay: 10

    - name: Get Keycloak service info
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: keycloak
        namespace: "{{ namespace }}"
      register: keycloak_service

    - name: Display deployment status
      debug:
        msg: |
          =====================================
          Keycloak Deployment Complete
          =====================================
          
          Namespace: {{ namespace }}
          
          Access URLs:
          - External: https://keycloak.orbb.li
          - Internal: http://keycloak.{{ namespace }}.svc.cluster.local:8080
          
          Admin Console:
          - URL: https://keycloak.orbb.li/admin
          - Username: admin
          - Password: (from secrets file)
          
          Realm Configuration:
          - Realm: orbb.li
          - Admin User: mail@orbb.li
          - Initial Password: (temporary, from secrets file)
          
          Google OAuth:
          - Status: Configured
          - Redirect URI: https://keycloak.orbb.li/realms/orbb.li/broker/google/endpoint
          
          Next Steps:
          1. Add DNS entry for keycloak.orbb.li → your ingress IP
          2. Login to admin console
          3. Change mail@orbb.li user password
          4. Test Google OAuth login
          
          To check application status:
          ARGOCD_OPTS="--core" argocd app get keycloak
          
          To view pods:
          kubectl get pods -n {{ namespace }}
          =====================================