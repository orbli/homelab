---
# 03 - Keycloak Deployment via ArgoCD
# This playbook:
# 1. Deploys ArgoCD Applications (which create namespace and placeholder secrets)
# 2. Patches the secrets with real passwords (ArgoCD ignores these changes)
# 3. Monitors deployment health
# 
# Note: ArgoCD won't override the patched secrets because:
# - selfHeal is disabled for keycloak-secrets app
# - ignoreDifferences is configured for /data in secrets

- name: Deploy Keycloak via ArgoCD
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    namespace: iam
    gitops_namespace: gitops
    secrets_file: "../secrets/keycloak-secrets.yaml"
    argocd_apps_path: "/home/eli/workbench/homelab/kubernetes/gitops/apps"
    
  tasks:
    - name: Check if secrets file exists
      stat:
        path: "{{ secrets_file }}"
      register: secrets_file_stat
      failed_when: not secrets_file_stat.stat.exists
      delegate_to: localhost

    - name: Load secrets
      include_vars: "{{ secrets_file }}"
      no_log: true
    
    - name: Generate PostgreSQL password if not set
      set_fact:
        postgres_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when: postgres_password is not defined or postgres_password == ""

    # STAGE 1: Deploy ArgoCD Applications (creates namespace and placeholder secrets)
    - name: Apply ArgoCD Applications for Keycloak
      shell: |
        kubectl apply -k {{ argocd_apps_path }}
      register: argocd_apps_result
      changed_when: true
      delegate_to: localhost

    - name: Wait for ArgoCD Applications to be created
      shell: |
        kubectl get application keycloak-secrets keycloak-operator keycloak-instance -n {{ gitops_namespace }}
      register: apps_check
      until: apps_check.rc == 0
      retries: 10
      delay: 5
      delegate_to: localhost

    # STAGE 2: Sync secrets app to create namespace and placeholder secrets
    - name: Sync keycloak-secrets application
      shell: |
        ARGOCD_OPTS="--core" argocd app sync keycloak-secrets --retry-limit 3
      register: sync_secrets
      changed_when: true
      delegate_to: localhost

    - name: Wait for namespace to exist
      shell: |
        kubectl get namespace {{ namespace }}
      register: ns_check
      until: ns_check.rc == 0
      retries: 10
      delay: 2
      delegate_to: localhost

    - name: Wait for placeholder secrets to be created
      shell: |
        kubectl get secret postgres-credentials keycloak-db-secret -n {{ namespace }}
      register: secrets_check
      until: secrets_check.rc == 0
      retries: 10
      delay: 2
      delegate_to: localhost

    # STAGE 3: Patch secrets with real passwords BEFORE operator starts
    - name: Patch PostgreSQL credentials with actual password
      shell: |
        echo -n "{{ postgres_password }}" | base64 | xargs -I {} kubectl patch secret postgres-credentials -n {{ namespace }} --type json -p='[
          {"op": "replace", "path": "/data/POSTGRES_PASSWORD", "value": "{}"}
        ]'
      register: patch_postgres
      changed_when: true
      delegate_to: localhost

    - name: Patch Keycloak database secret with actual password
      shell: |
        echo -n "{{ postgres_password }}" | base64 | xargs -I {} kubectl patch secret keycloak-db-secret -n {{ namespace }} --type json -p='[
          {"op": "replace", "path": "/data/password", "value": "{}"}
        ]'
      register: patch_keycloak_db
      changed_when: true
      delegate_to: localhost

    # STAGE 4: Sync operator to deploy PostgreSQL and Keycloak
    - name: Sync keycloak-operator application
      shell: |
        ARGOCD_OPTS="--core" argocd app sync keycloak-operator --retry-limit 3
      register: sync_operator
      changed_when: true
      delegate_to: localhost

    - name: Wait for PostgreSQL to be ready
      shell: |
        kubectl wait --for=condition=ready pod -l app=postgres-db -n {{ namespace }} --timeout=120s
      register: postgres_ready
      retries: 3
      delay: 10
      until: postgres_ready.rc == 0
      delegate_to: localhost

    # STAGE 5: Handle KeycloakRealmImport with patching
    # Since KeycloakRealmImport processes immediately, we need to delete any existing one first
    - name: Delete existing realm import if present
      shell: |
        kubectl delete keycloakrealmimport orbb-li-realm -n {{ namespace }} --ignore-not-found=true
      register: delete_realm
      changed_when: true
      delegate_to: localhost

    - name: Wait for realm deletion to complete
      pause:
        seconds: 3
      when: delete_realm.stdout != ""

    # Create realm YAML with substituted values in a temp file
    - name: Create realm configuration with actual values
      copy:
        content: |
          apiVersion: k8s.keycloak.org/v2alpha1
          kind: KeycloakRealmImport
          metadata:
            name: orbb-li-realm
            namespace: {{ namespace }}
          spec:
            keycloakCRName: keycloak
            realm:
              realm: orbb.li
              enabled: true
              displayName: "Orbb.li Realm"
              sslRequired: external
              registrationAllowed: false
              loginWithEmailAllowed: true
              duplicateEmailsAllowed: false
              resetPasswordAllowed: true
              editUsernameAllowed: false
              bruteForceProtected: true
              roles:
                realm:
                - name: admin
                  description: Administrator role
                - name: user
                  description: Regular user role
              users:
              - username: "orb.li"
                email: "mail@orbb.li"
                emailVerified: true
                enabled: true
                firstName: "Orb"
                lastName: "Li"
                realmRoles:
                - admin
                - user
                clientRoles:
                  realm-management:
                  - realm-admin
                  - manage-realm
                  - manage-users
                  - manage-clients
                  - manage-authorization
                  - manage-events
                  - manage-identity-providers
                  - view-realm
                  - view-users
                  - view-clients
                  - view-authorization
                  - view-events
                  - view-identity-providers
                federatedIdentities:
                - identityProvider: google
                  userId: "{{ google_mailorbbli_userid }}"
                  userName: "mail@orbb.li"
              identityProviders:
              - alias: google
                providerId: google
                enabled: true
                trustEmail: true
                storeToken: false
                addReadTokenRoleOnCreate: false
                authenticateByDefault: false
                linkOnly: false
                firstBrokerLoginFlowAlias: first broker login
                config:
                  clientId: "{{ google_client_id }}"
                  clientSecret: "{{ google_client_secret }}"
                  defaultScope: "openid email profile"
                  hostedDomain: "orbb.li"
                  useJwksUrl: "true"
                  hideOnLoginPage: "false"
                  syncMode: "FORCE"
              browserFlow: browser
              registrationFlow: registration
              directGrantFlow: direct grant
              resetCredentialsFlow: reset credentials
              clientAuthenticationFlow: clients
              dockerAuthenticationFlow: docker auth
              attributes:
                frontendUrl: "https://keycloak-lab.orbb.li"
                _browser_header.contentSecurityPolicy: "frame-src 'self'; frame-ancestors 'self'; object-src 'none';"
              eventsEnabled: true
              eventsListeners:
              - jboss-logging
              enabledEventTypes:
              - LOGIN
              - LOGIN_ERROR
              - LOGOUT
              - LOGOUT_ERROR
              - REGISTER
              - REGISTER_ERROR
              - CODE_TO_TOKEN
              - CODE_TO_TOKEN_ERROR
              adminEventsEnabled: true
              adminEventsDetailsEnabled: true
        dest: /tmp/orbb-li-realm-substituted.yaml
      delegate_to: localhost

    - name: Apply realm with substituted values
      shell: |
        kubectl apply -f /tmp/orbb-li-realm-substituted.yaml
      register: apply_realm
      changed_when: true
      delegate_to: localhost

    - name: Clean up temp file
      file:
        path: /tmp/orbb-li-realm-substituted.yaml
        state: absent
      delegate_to: localhost

    # STAGE 6: Monitor deployment status
    - name: Wait for keycloak-operator to be healthy
      shell: |
        ARGOCD_OPTS="--core" argocd app wait keycloak-operator --health --timeout 300
      register: operator_health
      retries: 3
      delay: 10
      until: operator_health.rc == 0
      delegate_to: localhost

    - name: Wait for keycloak-instance to be healthy
      shell: |
        ARGOCD_OPTS="--core" argocd app wait keycloak-instance --health --timeout 300
      register: instance_health
      retries: 3
      delay: 10
      until: instance_health.rc == 0
      delegate_to: localhost

    - name: Display deployment status
      debug:
        msg: |
          Keycloak deployment completed via ArgoCD!
          
          Applications deployed:
          - keycloak-secrets (namespace and secrets)
          - keycloak-operator (operator and PostgreSQL)
          - keycloak-instance (Keycloak realms)
          
          Access Keycloak at: https://keycloak-lab.orbb.li
          
          Monitor with:
            ARGOCD_OPTS="--core" argocd app list
            kubectl get all -n {{ namespace }}
      delegate_to: localhost

    # Optional: Create initial admin user (if needed)
    - name: Check if Keycloak admin user should be created
      shell: |
        kubectl get secret keycloak-initial-admin -n {{ namespace }} 2>/dev/null
      register: admin_secret_check
      failed_when: false
      changed_when: false
      delegate_to: localhost

    - name: Create Keycloak admin user secret (if not exists)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-initial-admin
            namespace: "{{ namespace }}"
            labels:
              app.kubernetes.io/managed-by: ansible
          type: Opaque
          data:
            username: "{{ 'admin' | b64encode }}"
            password: "{{ keycloak_admin_password | b64encode }}"
      when: admin_secret_check.rc != 0
      delegate_to: localhost