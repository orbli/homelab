---
- name: Install Tailscale Operator in Kubernetes
  hosts: localhost
  connection: local
  # Variables are inherited from on_prem group_vars in inventory.yaml
  tasks:
    - name: Add Tailscale Helm repository
      kubernetes.core.helm_repository:
        name: tailscale
        repo_url: https://pkgs.tailscale.com/helmcharts

    - name: Install Tailscale Operator
      kubernetes.core.helm:
        name: tailscale-operator
        chart_ref: tailscale/tailscale-operator
        # Pinned: re-running this playbook (or `helm upgrade --version`)
        # is the explicit upgrade trigger. The pinned version also
        # determines the tailscale binary version used by the Connector
        # pod the operator manages (image: tailscale/tailscale:<same>).
        # Bump in lockstep with the gitops-pusher pin in
        # .github/workflows/tailscale-sync.yml when feasible.
        chart_version: "1.98.3"
        release_namespace: networking
        create_namespace: true
        wait: true
        values:
          oauth:
            clientId: "{{ tailscale_k8s_op_oauth_client_id }}"
            clientSecret: "{{ tailscale_k8s_op_oauth_client_secret }}"
          operatorConfig:
            hostname: "{{ tailscale_k8s_op_hostname }}"

    - name: Apply Tailscale Connector configuration
      kubernetes.core.k8s:
        state: present
        src: k8s_configs/ts-connector.yaml


