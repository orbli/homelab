---
- name: Deploy Keycloak via GitOps
  hosts: localhost
  connection: local
  gather_facts: no
  
  tasks:
    - name: Ensure iam namespace exists
      kubernetes.core.k8s:
        name: iam
        api_version: v1
        kind: Namespace
        state: present

    - name: Create database secret for Keycloak
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-db-secret
            namespace: iam
            annotations:
              argocd.argoproj.io/sync-options: Prune=false
          type: Opaque
          stringData:
            username: keycloak
            password: "{{ lookup('password', '/tmp/keycloak-db-password chars=ascii_letters,digits length=20') }}"

    - name: Apply Keycloak ArgoCD Application
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../kubernetes/gitops/apps/keycloak.yaml"
        
    - name: Wait for ArgoCD to create the application
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: keycloak
        namespace: gitops
      register: app_status
      until: app_status.resources[0] is defined
      retries: 10
      delay: 5
      
    - name: Trigger initial sync of Keycloak application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: keycloak
            namespace: gitops
            annotations:
              argocd.argoproj.io/refresh: hard
      
    - name: Display application status
      debug:
        msg: |
          Keycloak ArgoCD application has been deployed.
          You can check the sync status with:
          kubectl get application keycloak -n gitops
          
          To view the application in ArgoCD CLI:
          argocd app get keycloak
          
          The application will be available at: https://auth.eliunix.com
          (once synced and pods are running)