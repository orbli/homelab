---
- name: Bootstrap Secrets for GitOps Migration
  hosts: localhost
  connection: local
  gather_facts: false
  
  tasks:
    - name: Ensure namespaces exist
      kubernetes.core.k8s:
        name: "{{ item }}"
        api_version: v1
        kind: Namespace
        state: present
      loop:
        - gitops
        - iam
        - networking
        - observability
    
    # Cloudflared tunnel credentials
    - name: Check if tunnel credentials secret exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: tunnel-credentials
        namespace: networking
      register: tunnel_secret
    
    - name: Create tunnel credentials secret
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: tunnel-credentials
            namespace: networking
            annotations:
              argocd.argoproj.io/sync-options: Prune=false
              managed-by: ansible
          data:
            credentials.json: "{{ lookup('file', '~/homelab-credentials/cloudflared-tunnel.json') | b64encode }}"
      when: tunnel_secret.resources | length == 0
      ignore_errors: yes
    
    # # Grafana OAuth secret for Keycloak SSO
    # - name: Check if Grafana OAuth secret exists
    #   kubernetes.core.k8s_info:
    #     api_version: v1
    #     kind: Secret
    #     name: grafana-oauth-secret
    #     namespace: observability
    #   register: grafana_secret
    
    # - name: Create Grafana OAuth secret
    #   kubernetes.core.k8s:
    #     definition:
    #       apiVersion: v1
    #       kind: Secret
    #       metadata:
    #         name: grafana-oauth-secret
    #         namespace: observability
    #         annotations:
    #           argocd.argoproj.io/sync-options: Prune=false
    #           managed-by: ansible
    #       data:
    #         client-secret: "{{ lookup('file', '~/homelab-credentials/grafana-oauth-secret') | b64encode }}"
    #   when: grafana_secret.resources | length == 0
    #   ignore_errors: yes
    
    - name: Display secret status
      debug:
        msg: |
          ========================================
          Secret Bootstrap Status
          ========================================
          
          Tunnel Credentials: {{ 'Created' if (tunnel_secret.resources | length == 0) else 'Already exists' }}
          
          Note: Secrets are marked with Prune=false so ArgoCD won't delete them.
          
          If secrets failed to create, ensure credential files exist:
          - ~/homelab-credentials/cloudflared-tunnel.json
          
          ======================================== 