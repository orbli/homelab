# This Application manages ArgoCD itself using Helm
# It ensures ArgoCD Core configuration without UI/server
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-helm
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.7.12
    helm:
      releaseName: argocd
      values: |
        # Core mode - no UI/server
        server:
          enabled: false
          replicas: 0
        
        dex:
          enabled: false
        
        notifications:
          enabled: false
        
        # Core components
        controller:
          replicas: 1
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
        
        repoServer:
          replicas: 1
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 512Mi
          env:
          - name: GOGC
            value: "50"
        
        redis:
          enabled: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        
        applicationSet:
          enabled: true
          replicas: 1
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        
        configs:
          cm:
            timeout.reconciliation: "180s"
            application.instanceLabelKey: argocd.argoproj.io/instance
          params:
            controller.status.processors: "10"
            controller.operation.processors: "5"
            controller.self.heal.timeout.seconds: "5"
            reposerver.parallelism.limit: "2"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m