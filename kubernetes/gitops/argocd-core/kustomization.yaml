apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops

# Use ArgoCD Helm chart as base
helmCharts:
- name: argo-cd
  repo: https://argoproj.github.io/argo-helm
  version: 7.7.12
  releaseName: argocd
  namespace: gitops
  valuesInline:
    # Core mode - no UI/server
    server:
      enabled: false
      
    dex:
      enabled: false
      
    notifications:
      enabled: false
    
    # Core components configuration
    controller:
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi
    
    repoServer:
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 512Mi
      env:
      - name: GOGC
        value: "50"
    
    redis:
      enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    
    applicationSet:
      enabled: true
      replicas: 1
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    
    configs:
      cm:
        timeout.reconciliation: "180s"
        application.instanceLabelKey: argocd.argoproj.io/instance
      params:
        controller.status.processors: "10"
        controller.operation.processors: "5"
        controller.self.heal.timeout.seconds: "5"
        reposerver.parallelism.limit: "2"

# Patches to ensure no server components
patches:
- target:
    kind: Deployment
    name: argocd-server
  patch: |
    $patch: delete
- target:
    kind: Service
    name: argocd-server
  patch: |
    $patch: delete
- target:
    kind: ServiceAccount
    name: argocd-server
  patch: |
    $patch: delete
- target:
    kind: Role
    name: argocd-server
  patch: |
    $patch: delete
- target:
    kind: RoleBinding
    name: argocd-server
  patch: |
    $patch: delete
- target:
    kind: ClusterRole
    name: argocd-server
  patch: |
    $patch: delete
- target:
    kind: ClusterRoleBinding
    name: argocd-server
  patch: |
    $patch: delete