apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops

# ArgoCD Core version configuration
configMapGenerator:
- name: argocd-version
  literals:
  - version=v3.1.0

# Reference to the official ArgoCD Core manifest
resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.1.0/manifests/core-install.yaml

# Optional: Resource adjustments for Raspberry Pi
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 512Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 256Mi
  target:
    kind: Deployment
    name: argocd-repo-server
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 256Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 128Mi
  target:
    kind: StatefulSet
    name: argocd-application-controller