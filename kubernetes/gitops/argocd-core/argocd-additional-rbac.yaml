# Additional RBAC permissions for ArgoCD self-management
# This enables the "App of Apps" pattern where ArgoCD manages itself
# This is a documented best practice in the ArgoCD community

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-application-controller-extra
rules:
# Allow full self-management of ArgoCD's own resources
# This enables the GitOps self-management pattern
- apiGroups:
  - "*"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Note: For production, consider restricting to specific resource types
# and namespaces for better security boundaries

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-application-controller-extra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-application-controller-extra
subjects:
- kind: ServiceAccount
  name: argocd-application-controller
  namespace: gitops