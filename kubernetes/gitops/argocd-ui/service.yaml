apiVersion: v1
kind: Service
metadata:
  name: argocd-ui
  namespace: gitops
  labels:
    app.kubernetes.io/name: argocd-ui
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-ui
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 8083
    targetPort: 8083
    protocol: TCP