apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-ui
  namespace: gitops
  labels:
    app.kubernetes.io/name: argocd-ui
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-ui
        app.kubernetes.io/part-of: argocd
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: argocd-repo-server
      containers:
      - name: argocd-server
        image: quay.io/argoproj/argocd:v3.1.0
        imagePullPolicy: IfNotPresent
        command:
        - argocd-server
        args:
        - --insecure
        - --disable-auth
        - --repo-server
        - argocd-repo-server:8081
        - --redis
        - argocd-redis:6379
        - --loglevel
        - info
        env:
        - name: ARGOCD_SERVER_INSECURE
          value: "true"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: argocd-redis
              key: auth
              optional: true
        ports:
        - containerPort: 8080
          name: server
          protocol: TCP
        - containerPort: 8083
          name: metrics
          protocol: TCP
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - name: argocd-cm
          mountPath: /app/config/cm
        - name: argocd-rbac-cm
          mountPath: /app/config/rbac
      volumes:
      - name: argocd-cm
        configMap:
          name: argocd-cm
          optional: true
      - name: argocd-rbac-cm
        configMap:
          name: argocd-rbac-cm
          optional: true