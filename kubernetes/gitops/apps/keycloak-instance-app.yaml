apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-instance
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/orbli/homelab.git
    targetRevision: master
    path: kubernetes/apps/iam/instance
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: iam
  syncPolicy:
    automated:
      prune: true
      selfHeal: false  # Disabled to preserve Ansible patches
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false  # Namespace created by secrets app
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  # Ignore changes to federated identity user IDs (managed by Ansible)
  - group: k8s.keycloak.org
    kind: KeycloakRealmImport
    name: orbb-li-realm
    jsonPointers:
    - /spec/realm/users/0/federatedIdentities/0/userId