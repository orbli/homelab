apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops

resources:
# ArgoCD UI Application
- argocd-ui-app.yaml

# Keycloak Applications (in order of sync wave)
- keycloak-secrets-app.yaml    # Wave 10: Namespace and secrets
- keycloak-operator-app.yaml   # Wave 20: Operator and PostgreSQL
- keycloak-instance-app.yaml   # Wave 30: Keycloak realms