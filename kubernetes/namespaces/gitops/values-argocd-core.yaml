# ArgoCD Core Configuration (Headless/No UI)
# Optimized for self-hosting on Raspberry Pi cluster

global:
  domain: argocd-gitops.home-hk1-cluster.orbb.li
  
configs:
  cm:
    # Core mode settings
    server.grpc.insecure: true
    
    # Disable features not needed for headless
    admin.enabled: true  # Will disable after initial setup
    
    # URL for self-management
    url: "https://argocd-gitops.home-hk1-cluster.orbb.li"
    
    # Application reconciliation settings
    timeout.reconciliation: 180s
    timeout.hard.reconciliation: 0s
    
    # Repository settings
    repositories: |
      - url: https://github.com/orbli/homelab.git
        name: homelab
        type: git
    
    # RBAC - Kubernetes RBAC only
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, certificates, *, *, allow
      p, role:admin, projects, *, *, allow
  
  params:
    # Core/headless specific settings
    server.insecure: true
    server.disable.auth: false
    
    # Controller settings for Pi hardware
    controller.status.processors: 10
    controller.operation.processors: 5
    controller.self.heal.timeout.seconds: 5
    
    # Repo server settings
    reposerver.parallelism.limit: 2
    
    # Application controller settings
    application.instanceLabelKey: argocd.argoproj.io/instance
    
  rbac:
    # Use Kubernetes RBAC
    create: true
    
# Server - Minimal for headless/API only
server:
  replicas: 1
  
  # Disable UI
  extraArgs:
    - --insecure
    - --disable-auth  # Since we're using K8s RBAC only
    
  service:
    type: ClusterIP
    servicePortGrpc: 443
    servicePortGrpcName: grpc
    
  # Minimal resources for API-only server
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
      
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"

# Controller - Main GitOps engine
controller:
  replicas: 1
  
  # Enable self-healing by default
  args:
    appResyncPeriod: "180"
    selfHealTimeout: "5"
    
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
      
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"

# Repo Server - Git operations
repoServer:
  replicas: 1
  
  # Increased memory to prevent OOMKilled issues
  # Repo-server needs more memory for Git operations and Helm chart processing
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  
  # Add environment variables for better memory management
  env:
    - name: GOGC
      value: "50"  # More aggressive garbage collection to reduce memory usage
      
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"

# Redis - Caching
redis:
  enabled: true
  
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ApplicationSet - For app-of-apps pattern
applicationSet:
  enabled: true
  
  replicas: 1
  
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
      
  metrics:
    enabled: true

# Notifications controller - Optional, disable for now
notifications:
  enabled: false

# Dex - Disabled for headless
dex:
  enabled: false

# No ingress for headless mode
server.ingress:
  enabled: false

# Service Monitor for Prometheus
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: observability
    additionalLabels:
      prometheus: kube-prometheus

# Node affinity for Raspberry Pi
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/arch
          operator: In
          values:
          - arm64
          - aarch64