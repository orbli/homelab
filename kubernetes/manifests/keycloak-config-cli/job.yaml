# Reconciles keycloak-config/realms/orbb.li.yaml into the live Keycloak.
#
# Why a Job (instead of a Deployment): keycloak-config-cli is a one-shot
# reconciler — it reads the YAML, applies diffs to Keycloak, exits. No
# long-running process required.
#
# Why an ArgoCD PostSync hook: regular Job resources are immutable once
# created, so ArgoCD cannot patch the spec when the ConfigMap's hashed
# name changes. Hook semantics let ArgoCD delete the previous Job and
# create a new one each sync, keyed on the hashed ConfigMap reference.
# PostSync (rather than Sync) guarantees the new ConfigMap is applied
# first, before this Job tries to mount it.
#
# hook-delete-policy=BeforeHookCreation keeps the latest completed Job
# visible (and `kubectl logs`-able) until the next sync replaces it.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-config-cli
  namespace: iam
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-config-cli
    spec:
      restartPolicy: Never
      containers:
        - name: keycloak-config-cli
          # Pinned: keycloak-config-cli version 6.5.1, built against
          # Keycloak 26.x admin API (rolling within 26 major). Our live
          # Keycloak is 26.3.3; the 26-major rolling tag is the most
          # specific tag adorsys publishes that's guaranteed compatible.
          # Bump to 27 when upgrading Keycloak across major versions.
          image: adorsys/keycloak-config-cli:6.5.1-26
          env:
            # Internal service — no public hostname needed. Short name
            # works because the Job runs in the iam namespace alongside
            # Keycloak; k3s in this cluster uses a non-default DNS
            # domain (home-hk1-cluster.orbb.li, not cluster.local), so
            # the namespace-local short form is the portable choice.
            - name: KEYCLOAK_URL
              value: http://keycloak-service:8080
            # Credentials sourced from the secret Ansible created during
            # Keycloak bootstrap. Never leave the cluster.
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: username
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: password
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: IMPORT_FILES_LOCATIONS
              value: "/config/*.yaml"
            - name: IMPORT_VAR_SUBSTITUTION_ENABLED
              value: "true"
            # Ownership policy: only groups are git-authoritative
            # (full = delete things not in YAML). Everything else is
            # additive (no-delete) so we don't fight with the Ansible-
            # managed clients and federated users. See
            # keycloak-config/README.md "Ownership boundary".
            - name: IMPORT_MANAGED_GROUP
              value: "full"
            - name: IMPORT_MANAGED_USER
              value: "no-delete"
            - name: IMPORT_MANAGED_CLIENT
              value: "no-delete"
            - name: IMPORT_MANAGED_CLIENT_SCOPE
              value: "no-delete"
            - name: IMPORT_MANAGED_AUTHENTICATION_FLOW
              value: "no-delete"
            - name: IMPORT_MANAGED_IDENTITY_PROVIDER
              value: "no-delete"
            - name: IMPORT_MANAGED_IDENTITY_PROVIDER_MAPPER
              value: "no-delete"
            - name: IMPORT_MANAGED_REQUIRED_ACTION
              value: "no-delete"
            - name: IMPORT_MANAGED_COMPONENT
              value: "no-delete"
            - name: IMPORT_MANAGED_SUB_COMPONENT
              value: "no-delete"
            - name: IMPORT_MANAGED_SCOPE_MAPPING
              value: "no-delete"
            - name: IMPORT_MANAGED_ROLE
              value: "no-delete"
          volumeMounts:
            - name: realm-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: realm-config
          configMap:
            # Kustomize rewrites this to the hashed name at render time
            # (e.g. keycloak-realm-config-7d8f2c).
            name: keycloak-realm-config
