apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: iam
spec:
  instances: 1
  # Custom image built by .github/workflows/build-keycloak.yml from the
  # adjacent Dockerfile. Bakes everything under themes/ into
  # /opt/keycloak/themes/ of the upstream quay.io/keycloak/keycloak:26.6.2
  # base. CI publishes :26.6.2 (always-current) plus :26.6.2-<timestamp>
  # and :sha-<commit> immutable tags. The CR pins :26.6.2 + Always pull,
  # so a fresh CI publish + pod rollout picks up new theme content.
  image: ghcr.io/orbli/keycloak:26.6.2
  
  # Disable optimized flag to avoid startup issues
  startOptimized: false
  
  # Database configuration
  db:
    vendor: postgres
    host: postgres-db
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret  
      key: password
  
  # HTTP/HTTPS configuration
  http:
    httpEnabled: true
    
  # Hostname configuration - accessed via Cloudflare Tunnel
  hostname:
    hostname: https://keycloak-lab.orbb.li
    admin: https://keycloak-lab.orbb.li
    strict: false
    strictBackchannel: false
  
  # Proxy configuration for Cloudflare Tunnel
  proxy:
    headers: xforwarded
    
  # Transaction configuration
  transaction:
    xaEnabled: false
  
  # Additional options
  additionalOptions:
    - name: health-enabled
      value: "true"
    - name: metrics-enabled
      value: "true"
    - name: proxy
      value: "edge"
    - name: proxy-headers
      value: "xforwarded"
    - name: hostname-strict-https
      value: "false"
    - name: spi-sticky-session-encoder-infinispan-should-attach-route
      value: "false"
    - name: http-relative-path
      value: "/"
    - name: spi-login-protocol-openid-connect-legacy-logout-redirect-uri
      value: "true"
    
  # Resource limits for Raspberry Pi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Force a fresh image pull on every pod start. Custom themes are baked
  # into the image now (see Dockerfile); the :26.6.2 tag is overwritten by
  # CI on every theme change, so Always ensures pod rollouts pick up new
  # bits without us having to bump the tag in this file.
  unsupported:
    podTemplate:
      spec:
        containers:
        - name: keycloak
          imagePullPolicy: Always

  # The operator will automatically create keycloak-initial-admin secret