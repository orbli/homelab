apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: iam
spec:
  instances: 1
  image: quay.io/keycloak/keycloak:26.3.3
  
  # Disable optimized flag for initial startup
  startOptimized: false
  
  # Database configuration
  db:
    vendor: postgres
    host: postgres-db
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret  
      key: password
  
  # HTTP/HTTPS configuration
  http:
    httpEnabled: true
    
  # Hostname configuration
  hostname:
    hostname: https://keycloak-lab.orbb.li
    admin: https://keycloak-lab.orbb.li
    strict: false
    strictBackchannel: false
  
  # Proxy configuration for running behind ingress
  proxy:
    headers: xforwarded
    
  # Transaction configuration
  transaction:
    xaEnabled: false
  
  # Additional options
  additionalOptions:
    - name: health-enabled
      value: "true"
    - name: metrics-enabled
      value: "true"
    - name: log-level
      value: "DEBUG"
    - name: log-console-level
      value: "DEBUG"
    - name: proxy
      value: "edge"
    # Enable detailed logging for OAuth and authentication
    - name: log-level:org.keycloak.broker
      value: "TRACE"
    - name: log-level:org.keycloak.services
      value: "DEBUG"
    - name: log-level:org.keycloak.authentication
      value: "DEBUG"
    - name: log-level:org.keycloak.events
      value: "DEBUG"
    
  # Resource limits for Raspberry Pi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
      
  # Disable unsupported features in operator
  # The operator will automatically create keycloak-initial-admin secret